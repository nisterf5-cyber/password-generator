<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔐 Password Checker + Fancy Calculator</title>
<link rel="icon" type="image/png" href="favicon-rounded.png">
<link rel="shortcut icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Source+Code+Pro:wght@500&display=swap" rel="stylesheet">
<style>
*{ font-family:'Poppins',sans-serif; box-sizing:border-box; margin:0; padding:0; }
body{ display:flex; justify-content:center; align-items:center; min-height:100vh; background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1); background-size:400% 400%; animation:gradientBG 15s ease infinite; color:white;}
@keyframes gradientBG{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.container{ background:rgba(0,0,0,0.35); padding:25px 20px; border-radius:20px; width:450px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.35);}
h1{ font-size:1.5em; margin-bottom:15px;}
h2{ font-size:1.2em; margin:15px 0 5px 0;}
input[type=text], input[type=number]{
    width:100%;
    padding:10px;
    border:none;
    border-radius:12px;
    margin-bottom:12px;
    font-family:'Source Code Pro', monospace;
    background:rgba(255,255,255,0.1);
    color:white;
    transition:0.3s;
}
input[type=text]:focus, input[type=number]:focus{
    background:rgba(255,255,255,0.2);
    box-shadow:0 0 10px rgba(255,255,255,0.3);
    outline:none;
}
/* Hide default arrows */
input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
input[type=number] {
    -moz-appearance: textfield;
    position: relative;
}

/* Custom arrows inside input */
.num-input-container {
    position: relative;
    margin-bottom:12px;
}
.num-input-container input{
    width:100%;
    padding-right:35px; /* space for arrows */
    text-align:center;
    border-radius:12px;
}
.num-input-container .arrows{
    position:absolute;
    right:5px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:2px;
}
.arrows button{
    background:linear-gradient(to right,#ffb347,#ffcc70);
    border:none;
    width:22px;
    height:18px;
    cursor:pointer;
    border-radius:5px;
    color:white;
    font-weight:700;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.2s;
}
/* Slight darken on hover only */
.arrows button:hover{
    filter:brightness(0.85);
    transform:translateY(0); /* no pop-out */
}

#result, #calculatorResult{
    background:rgba(255,255,255,0.12);
    padding:15px;
    border-radius:12px;
    text-align:left;
    line-height:1.8;
    font-size:0.95em;
    margin-bottom:10px;
    transition:0.4s;
}
.small{ margin-top:10px; font-size:0.8em; opacity:0.8;}
button.main-btn{ padding:10px 18px; border:none; border-radius:12px; cursor:pointer; font-weight:600; background:linear-gradient(to right,#ffb347,#ffcc70); color:white; transition:0.3s; margin-bottom:15px;}
button.main-btn:hover{ transform:scale(1.05);}
</style>
</head>
<body>

<div class="container">
    <h1>🔐 Professional Password Checker</h1>

    <!-- PASSWORD CHECKER -->
    <input type="text" id="password" placeholder="Enter password">
    <button class="main-btn" onclick="checkPassword()">Check All Attack Speeds</button>
    <div id="result"></div>

    <div class="small">Century = 100 years | Millennium = 1000 years</div>

    <!-- TIME CALCULATOR -->
    <h2>🧮 Time Calculator</h2>

    <div class="num-input-container">
        <input type="number" id="yearsInput" placeholder="Years" oninput="calculateTime()">
        <div class="arrows">
            <button onclick="increment('yearsInput')">▲</button>
            <button onclick="decrement('yearsInput')">▼</button>
        </div>
    </div>
    <div class="num-input-container">
        <input type="number" id="centuriesInput" placeholder="Centuries" oninput="calculateTime()">
        <div class="arrows">
            <button onclick="increment('centuriesInput')">▲</button>
            <button onclick="decrement('centuriesInput')">▼</button>
        </div>
    </div>
    <div class="num-input-container">
        <input type="number" id="millenniaInput" placeholder="Millennia" oninput="calculateTime()">
        <div class="arrows">
            <button onclick="increment('millenniaInput')">▲</button>
            <button onclick="decrement('millenniaInput')">▼</button>
        </div>
    </div>

    <div id="calculatorResult"></div>

    <button class="main-btn" onclick="window.location.href='index.html'">← Back to Generator</button>
</div>

<script>
// PASSWORD CHECKER
function checkPassword(){
    const pwd=document.getElementById("password").value;
    if(!pwd){
        document.getElementById("result").innerHTML="⚠ Enter a password first";
        return;
    }
    let charset=0;
    if(/[a-z]/.test(pwd)) charset+=26;
    if(/[A-Z]/.test(pwd)) charset+=26;
    if(/[0-9]/.test(pwd)) charset+=10;
    if(/[^a-zA-Z0-9]/.test(pwd)) charset+=32;

    const combinations=Math.pow(charset,pwd.length);
    const attacks=[
        {name:"🌐 Online Website Attack", speed:10},
        {name:"💻 Common PC Brute Force", speed:1e6},
        {name:"🎮 Fast GPU Attack", speed:1e10},
        {name:"⚡ Extreme Cracking Rig", speed:1e11}
    ];

    let html="";
    attacks.forEach(attack=>{
        const seconds=combinations/attack.speed;
        html+=`<b>${attack.name}</b><br>⏱ ${formatTime(seconds)}<br><br>`;
    });
    html+=`<b>🔢 Total combinations</b><br>${combinations.toExponential(3)}`;

    const resultBox=document.getElementById("result");
    resultBox.innerHTML=html;
    resultBox.style.background="rgba(255,255,255,0.12)";
    resultBox.style.boxShadow="0 0 15px rgba(255,255,255,0.3)";
    setTimeout(()=>{ resultBox.style.boxShadow="0 0 0 rgba(0,0,0,0)"; }, 800);
}

// FORMAT TIME
function formatTime(seconds){
    const minute=60; const hour=3600; const day=86400; const year=31536000;
    const century=year*100; const millennium=year*1000;
    if(seconds < minute) return Math.round(seconds)+" seconds";
    if(seconds < hour) return Math.round(seconds/minute)+" minutes";
    if(seconds < day) return Math.round(seconds/hour)+" hours";
    if(seconds < year) return Math.round(seconds/day)+" days";
    if(seconds < century) return Math.round(seconds/year)+" years";
    if(seconds < millennium) return Math.round(seconds/century)+" centuries";
    return Math.round(seconds/millennium)+" millennia";
}

// TIME CALCULATOR
function calculateTime(){
    const years=document.getElementById("yearsInput").value || 0;
    const centuries=document.getElementById("centuriesInput").value || 0;
    const millennia=document.getElementById("millenniaInput").value || 0;
    const totalYears=Number(years) + Number(centuries)*100 + Number(millennia)*1000;
    const calcResult=document.getElementById("calculatorResult");
    calcResult.innerHTML=`Equivalent time: ${totalYears} years ≈ ${Math.floor(totalYears/100)} centuries ≈ ${Math.floor(totalYears/1000)} millennia`;
    calcResult.style.background="rgba(255,255,255,0.2)";
    calcResult.style.boxShadow="0 0 12px rgba(255,255,255,0.4)";
    setTimeout(()=>{
        calcResult.style.background="rgba(255,255,255,0.12)";
        calcResult.style.boxShadow="0 0 0 rgba(0,0,0,0)";
    },500);
}

// CUSTOM ARROW FUNCTIONS
function increment(id){
    const input=document.getElementById(id);
    input.value=Number(input.value||0)+1;
    calculateTime();
}
function decrement(id){
    const input=document.getElementById(id);
    input.value=Number(input.value||0)-1;
    if(input.value<0) input.value=0;
    calculateTime();
}
</script>

</body>
</html>

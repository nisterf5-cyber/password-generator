<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔐 Password Vault</title>
<link rel="icon" type="image/png" href="favicon-rounded.png">
<link rel="shortcut icon" href="favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Source+Code+Pro:wght@500&display=swap" rel="stylesheet">
<style>



*{ font-family:'Poppins',sans-serif; box-sizing:border-box; margin:0; padding:0; }
body{ display:flex; justify-content:center; align-items:center; min-height:100vh; background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1); background-size:400% 400%; animation:gradientBG 15s ease infinite; color:white; overflow:hidden; }
@keyframes gradientBG{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.container{ background:rgba(0,0,0,0.35); padding:25px 20px; border-radius:20px; width:320px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.35); display:flex; flex-direction:column; }
h1{ font-size:1.6em; margin-bottom:20px; }
.input-row{ display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:12px; position:relative; }
input[type="number"]{ width:55px; padding:8px; border:none; border-radius:8px; text-align:center; -moz-appearance: textfield; }
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }


/* Custom arrows */
.arrow-up, .arrow-down {
    position:absolute;
    right:5px;
    width:18px;
    height:18px;
    background: rgba(255,255,255,0.2);
    border-radius:5px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:10px;
    cursor:pointer;
    opacity:0;
    transition:0.3s;
}
.input-row:hover .arrow-up,
.input-row:hover .arrow-down { opacity:1; }
.arrow-up{ top:4px; }
.arrow-down{ bottom:4px; }
.arrow-up:hover, .arrow-down:hover { background: rgba(255,255,255,0.35); transform: scale(1.1); }

button{ padding:10px 18px; border:none; border-radius:12px; cursor:pointer; font-weight:600; margin-top:8px; background:linear-gradient(to right,#ffb347,#ffcc70); color:white; transition:0.3s ease; }
button:hover{ transform:scale(1.05); box-shadow:0 6px 15px rgba(0,0,0,0.25);}
#passwords{ margin-top:18px; display:flex; flex-direction:column; gap:10px; max-height:260px; overflow-y:auto; padding-right:4px; }
#passwords::-webkit-scrollbar{ width:8px; }
#passwords::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.35); border-radius:10px; }
.password-box{ background:rgba(255,255,255,0.15); padding:12px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; font-family:'Source Code Pro',monospace; flex-direction:column; gap:6px; }
.copy-btn{ border:none; border-radius:8px; padding:5px 10px; background:rgba(255,255,255,0.2); color:white; cursor:pointer; transition:0.3s ease; }
.copy-btn:hover{ transform:scale(1.05); background:rgba(255,255,255,0.3); }
.option-group{ margin-top:10px; text-align:left; display:flex; flex-direction:column; gap:5px; }
#copyPopup{ position:absolute; top:-40px; left:50%; transform:translateX(-50%); opacity:0; transition:0.4s; background:rgba(255,255,255,0.2); padding:6px 15px; border-radius:10px; }
#copyPopup.show{ opacity:1; }
#errorPopup{ position:absolute; bottom:100%; left:50%; transform:translateX(-50%); width:100%; padding:8px 0; border-radius:8px; opacity:0; transition:0.4s; margin-bottom:10px; font-weight:600; background:linear-gradient(90deg,#ff9a9e,#fad0c4,#a18cd1); color:white; }
#errorPopup.show{ opacity:1; }
.confetti{ position:fixed; width:8px; height:8px; border-radius:50%; animation:fall 1s linear forwards; }
@keyframes fall{ 0%{transform:translateY(0);} 100%{transform:translateY(100vh);} }
</style>
</head>
<body>

<div class="container">
    <h1>🔐 Password Vault</h1>

    <div class="input-row">
        <label>Length:</label>
        <input type="number" id="length" value="12" min="4" max="50">
        <div class="arrow-up" onclick="document.getElementById('length').stepUp()">&#9650;</div>
        <div class="arrow-down" onclick="document.getElementById('length').stepDown()">&#9660;</div>
    </div>

    <div class="input-row">
        <label>Passwords:</label>
        <input type="number" id="count" value="3" min="1" max="20">
        <div class="arrow-up" onclick="document.getElementById('count').stepUp()">&#9650;</div>
        <div class="arrow-down" onclick="document.getElementById('count').stepDown()">&#9660;</div>
    </div>

    <div class="option-group">
        <label><input type="checkbox" id="letters" checked> Include Letters</label>
        <label><input type="checkbox" id="numbers" checked> Include Numbers</label>
        <label><input type="checkbox" id="symbols" checked> Include Symbols</label>
    </div>

    <button onclick="generatePassword()">Generate</button>

    <div id="passwords"></div>

    <button onclick="copyPasswords()">Copy All Passwords</button>
    <button onclick="window.location.href='checker.html'">Check Password Safety 🔐</button>

    <div id="copyPopup">✅ Copied!</div>
    <div id="errorPopup"></div>
</div>

<script>
function generatePassword(){
    const length=parseInt(document.getElementById('length').value);
    const count=parseInt(document.getElementById('count').value);
    const includeLetters=document.getElementById('letters').checked;
    const includeNumbers=document.getElementById('numbers').checked;
    const includeSymbols=document.getElementById('symbols').checked;

    if(!includeLetters && !includeNumbers && !includeSymbols){
        showErrorPopup("⚠ Please select at least one option!");
        return;
    }

    let chars='';
    if(includeLetters) chars+='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
    if(includeNumbers) chars+='0123456789';
    if(includeSymbols) chars+='!@#$%^&*()';

    const passwordsDiv=document.getElementById('passwords');
    passwordsDiv.innerHTML='';

    for(let j=0;j<count;j++){
        let password='';
        for(let i=0;i<length;i++){
            password+=chars[Math.floor(Math.random()*chars.length)];
        }

        const box=document.createElement('div');
        box.className='password-box';

        const text=document.createElement('span');
        text.textContent=password;

        const btn=document.createElement('button');
        btn.textContent='Copy';
        btn.className='copy-btn';
        btn.onclick=()=>copySinglePassword(password);

        box.appendChild(text);
        box.appendChild(btn);
        passwordsDiv.appendChild(box);
    }
}

function copySinglePassword(password){
    navigator.clipboard.writeText(password).then(()=>{
        showCopyPopup();
        launchConfetti();
    });
}

function copyPasswords(){
    const passwords=Array.from(document.getElementsByClassName('password-box'))
    .map(el=>el.querySelector('span').textContent)
    .join('\n');
    navigator.clipboard.writeText(passwords).then(()=>{
        showCopyPopup();
        launchConfetti();
    });
}

function showCopyPopup(){
    const popup=document.getElementById('copyPopup');
    popup.classList.add('show');
    setTimeout(()=>popup.classList.remove('show'),1500);
}

function showErrorPopup(message){
    const popup=document.getElementById('errorPopup');
    popup.textContent=message;
    popup.classList.add('show');
    setTimeout(()=>popup.classList.remove('show'),1500);
}

function launchConfetti(){
    for(let i=0;i<15;i++){
        const confetti=document.createElement('div');
        confetti.className='confetti';
        confetti.style.left=Math.random()*window.innerWidth+'px';
        confetti.style.top='0px';
        confetti.style.background=`hsl(${Math.random()*360},100%,70%)`;
        document.body.appendChild(confetti);
        setTimeout(()=>confetti.remove(),1000);
    }
}
</script>

</body>
</html>
